name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging-env

    steps:
      - uses: actions/checkout@v3

      - name: Build Project
        run: npm install && npm run build

      - name: Deploy to Staging Server
        run: echo "Deploying to Staging Environment...(/)"
